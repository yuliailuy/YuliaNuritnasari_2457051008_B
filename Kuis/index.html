<body>
    <div class="login-box">

        <img src="logo.png" class="logo">
        </div>

    <p>Selamat Datang</h2>

        <div class="opsi">

            <label class="ingat">
                <input type="checkbox"> Ingat saya
            </label>

        </div>

        <button type="submit">Masuk</button>

    </form>

</div>
